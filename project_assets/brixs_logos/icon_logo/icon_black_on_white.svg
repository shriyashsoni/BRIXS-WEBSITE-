<svg width="320" height="320" viewBox="0 0 320 320"
  xmlns="http://www.w3.org/2000/svg">
<rect width="320" height="320" fill="#FFFFFF"/>
<g transform="translate(-40, 53)">

  <!-- TOP FACE -->
  <polygon points="200,52 248,79 200,106 152,79"
    fill="#000000" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="200" y1="52" x2="200" y2="106" stroke="#444444" stroke-width="1"/>
  <line x1="176" y1="65" x2="224" y2="92" stroke="#444444" stroke-width="0.6"/>

  <!-- RIGHT FACE -->
  <polygon points="248,79 248,133 200,160 200,106"
    fill="#555555" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="224" y1="92" x2="224" y2="146" stroke="#444444" stroke-width="0.9"/>
  <line x1="248" y1="79" x2="200" y2="160" stroke="#444444" stroke-width="0.6"/>

  <!-- LEFT FACE -->
  <polygon points="152,79 200,106 200,160 152,133"
    fill="#222222" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="176" y1="92" x2="176" y2="146" stroke="#444444" stroke-width="0.9"/>
  <line x1="152" y1="79" x2="200" y2="160" stroke="#444444" stroke-width="0.5"/>

  <!-- SECOND CUBE top-right stacked -->
  <polygon points="248,25 296,52 248,79 200,52"
    fill="#000000" stroke="#FFFFFF" stroke-width="1.5" opacity="0.85"/>
  <line x1="248" y1="25" x2="248" y2="79" stroke="#444444" stroke-width="0.7"/>
  <polygon points="296,52 296,106 248,133 248,79"
    fill="none" stroke="#000000" stroke-width="1.5" opacity="0.6"/>

  <!-- THIRD CUBE bottom-left ghost -->
  <polygon points="152,133 200,160 200,214 152,187"
    fill="none" stroke="#000000" stroke-width="1.5" opacity="0.45"/>
  <polygon points="200,160 248,133 248,187 200,214"
    fill="#222222" stroke="#FFFFFF" stroke-width="1.2" opacity="0.5"/>

  <!-- VERTEX DOTS -->
  <circle cx="200" cy="52"  r="3"   fill="#000000"/>
  <circle cx="248" cy="79"  r="2.5" fill="#000000"/>
  <circle cx="152" cy="79"  r="2.5" fill="#000000"/>
  <circle cx="200" cy="106" r="2.5" fill="#000000"/>
  <circle cx="248" cy="25"  r="2"   fill="#444444"/>
  <circle cx="296" cy="52"  r="2"   fill="#444444"/>
  <circle cx="200" cy="160" r="2"   fill="#444444"/>

</g>
</svg>